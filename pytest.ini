[pytest]
# Test discovery
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require external services)
    contract: Contract tests (verify MCP server interfaces)
    slow: Slow running tests
    asyncio: Async tests
    odoo: Tests requiring Odoo connection
    social: Tests requiring social media APIs
    email: Tests requiring email configuration
    simulator: Tests using simulator mode

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --disable-warnings

# Coverage options (uncomment to enable)
#    --cov=src
#    --cov=mcp_server
#    --cov=orchestrator
#    --cov-report=html
#    --cov-report=term-missing

# Logging
log_cli = false
log_cli_level = INFO

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info .specify history specs Briefings Audit_Logs
